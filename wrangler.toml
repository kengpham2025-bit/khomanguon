# OpenNext chạy trên Workers — KHÔNG dùng `wrangler pages deploy .open-next/cloudflare`
# (thư mục đó chỉ vài file phụ, thiếu worker + assets → site 404).
# Deploy: npm run pages:deploy  →  opennextjs-cloudflare deploy  →  wrangler deploy

name = "khomanguon"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "khomanguon"

[[d1_databases]]
binding = "DB"
# Tên hiển thị trên Dashboard; bắt buộc khớp DB bạn chọn. Worker thực sự bind theo database_id.
database_name = "khomanguonnew"
database_id = "a68e1aec-8fff-4a5f-a1cd-9a54d9623dd2"

[images]
binding = "IMAGES"

# JWT_SECRET — session đăng nhập (không dùng cho captcha): wrangler secret put JWT_SECRET
# PayOS — Workers: wrangler secret put PAYOS_CLIENT_ID  (và các biến còn lại)
# Webhook: https://khomanguon.io.vn/api/deposit/webhook
[vars]
NEXT_PUBLIC_APP_URL = "https://khomanguon.io.vn"
# NEXT_PUBLIC_TURNSTILE_SITE_KEY: set bằng wrangler secret put NEXT_PUBLIC_TURNSTILE_SITE_KEY
# (hoặc vào Dashboard → Workers → khomanguon → Settings → Variables)
